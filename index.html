<style>
  :root {
    --navy:#0f172a; --navy2:#1e293b; --orange:#ea7317; --orange2:#f59e0b;
    --blue:#2563eb; --purple:#7c3aed; --green:#059669;
    --bg:#f8fafc; --card:#ffffff; --border:#e2e8f0;
    --text:#0f172a; --muted:#64748b;
    --radius:14px;
    --shadow:0 1px 3px rgba(15,23,42,.06),0 8px 24px -12px rgba(15,23,42,.12);
    --shadow-hover:0 4px 12px rgba(15,23,42,.08),0 20px 40px -16px rgba(15,23,42,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}

  .topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
  .topbar-inner{max-width:1440px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:20px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;letter-spacing:.5px}
  .logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--navy),var(--orange));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px}
  .logo-mark svg{width:18px;height:18px}
  .logo small{color:var(--muted);font-weight:400;font-size:13px;margin-left:6px}
  .topbar-spacer{flex:1}
  .search-box{position:relative;width:320px}
  .search-box input{width:100%;padding:10px 14px 10px 38px;border:1px solid var(--border);border-radius:10px;background:#fff;font-size:14px;transition:.2s}
  .search-box input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(234,115,23,.1)}
  .search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted)}

  .hero{max-width:1440px;margin:0 auto;padding:48px 28px 24px}
  .hero h1{font-size:36px;font-weight:800;letter-spacing:-.5px;color:var(--navy);margin-bottom:8px}
  .hero h1 .accent{background:linear-gradient(120deg,var(--orange),var(--orange2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{font-size:16px;color:var(--muted);max-width:720px}
  .hero-meta{margin-top:18px;display:flex;gap:24px;flex-wrap:wrap}
  .stat{display:flex;align-items:baseline;gap:6px}
  .stat .num{font-size:26px;font-weight:800;color:var(--navy)}
  .stat .lbl{font-size:13px;color:var(--muted)}

  .controls{max-width:1440px;margin:0 auto;padding:16px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .chips{display:flex;gap:8px;flex-wrap:wrap;flex:1}
  .chip{padding:8px 14px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:13px;color:var(--muted);transition:.2s;font-weight:500}
  .chip:hover{border-color:var(--navy);color:var(--navy)}
  .chip.active{background:var(--navy);border-color:var(--navy);color:#fff}
  .chip .count{opacity:.7;margin-left:4px;font-size:11px}

  .mode-toggle{display:flex;border:1px solid var(--border);border-radius:10px;background:#fff;overflow:hidden}
  .mode-btn{padding:8px 14px;font-size:13px;color:var(--muted);border-right:1px solid var(--border);display:flex;align-items:center;gap:6px;transition:.2s}
  .mode-btn:last-child{border-right:0}
  .mode-btn:hover{color:var(--navy)}
  .mode-btn.active{background:var(--navy);color:#fff}
  .mode-btn svg{width:14px;height:14px}

  .grid{max-width:1440px;margin:0 auto;padding:8px 28px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
  .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;transition:.25s;box-shadow:var(--shadow)}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);border-color:transparent}
  .visual{position:relative;aspect-ratio:16/10;background:#f1f5f9;overflow:hidden;cursor:pointer;user-select:none}

  /* 底圖層（唯一全覆蓋的規則）*/
  .layer-before, .layer-after{position:absolute;inset:0;width:100%;height:100%}
  .visual img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
  .missing{display:flex;align-items:center;justify-content:center;height:100%;color:#94a3b8;font-size:12px;background:#f1f5f9}

  /* Slider */
  .slider-mode .layer-after{clip-path:inset(0 0 0 50%);transition:none}
  .slider-mode .divider{position:absolute;top:0;bottom:0;left:50%;width:2px;background:rgba(255,255,255,.95);box-shadow:0 0 0 1px rgba(15,23,42,.2);cursor:ew-resize;z-index:3;transform:translateX(-50%)}
  .slider-mode .divider::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;background:#fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:ew-resize}
  .slider-mode .divider::before{content:"⇆";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:4;font-size:14px;color:var(--navy);font-weight:700}

  /* Hover：只顯示當下階段的 label，點擊開啟 Lightbox */
  .hover-mode .visual{cursor:zoom-in}
  .hover-mode .layer-after{opacity:0;transition:opacity .4s ease}
  .hover-mode .visual:hover .layer-after{opacity:1}
  .hover-mode .divider{display:none}
  .hover-mode .label{transition:opacity .25s ease}
  .hover-mode .visual .label-after{opacity:0}
  .hover-mode .visual:hover .label-before{opacity:0}
  .hover-mode .visual:hover .label-after{opacity:1}


  /* Labels（獨立 class，不與底圖層混用）*/
  .label{position:absolute;top:10px;padding:3px 10px;font-size:11px;font-weight:600;color:#fff;border-radius:999px;backdrop-filter:blur(8px);z-index:2;letter-spacing:.5px;width:auto;height:auto;inset:auto}
  .label-before{left:10px;background:rgba(15,23,42,.7)}
  .label-after{right:10px;background:rgba(234,115,23,.85)}

  .content{padding:18px 18px 16px;flex:1;display:flex;flex-direction:column}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;margin-bottom:10px;width:fit-content}
  .badge.arch{background:#dbeafe;color:#1e40af}
  .badge.interior{background:#fce7f3;color:#9d174d}
  .badge.id{background:#ede9fe;color:#5b21b6}
  .badge.doc{background:#ccfbf1;color:#115e59}
  .badge.photo{background:#fef3c7;color:#92400e}
  .title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:6px;line-height:1.4}
  .desc{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:14px;flex:1}
  .btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 14px;background:var(--navy);color:#fff;border-radius:10px;font-size:13px;font-weight:600;transition:.2s}
  .btn:hover{background:var(--orange);transform:translateY(-1px)}
  .btn svg{width:14px;height:14px}

  /* Lightbox overlay */
  .lightbox-overlay{position:fixed;inset:0;background:rgba(15,23,42,.92);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center;padding:40px}
  .lightbox-overlay.show{display:flex}
  .lightbox-content{max-width:1200px;width:100%;background:#fff;border-radius:16px;overflow:hidden;position:relative;max-height:92vh;display:flex;flex-direction:column}
  .lightbox-close{position:absolute;top:16px;right:16px;width:36px;height:36px;background:rgba(15,23,42,.5);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:5;font-size:20px}
  .lightbox-close:hover{background:rgba(15,23,42,.8)}
  .lightbox-visual{position:relative;aspect-ratio:16/9;background:#0f172a;overflow:hidden;user-select:none}
  .lightbox-visual img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none}
  .lightbox-body{padding:20px 28px 24px;overflow-y:auto}
  .lightbox-body h3{font-size:22px;margin-bottom:6px;color:var(--navy)}
  .lightbox-body p{color:var(--muted);margin-bottom:14px}
  .lightbox-toggle{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
  .lightbox-toggle button{padding:6px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff}
  .lightbox-toggle button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .lightbox-divider{position:absolute;top:0;bottom:0;left:50%;width:2px;background:rgba(255,255,255,.95);box-shadow:0 0 0 1px rgba(15,23,42,.2);cursor:ew-resize;z-index:3;transform:translateX(-50%)}
  .lightbox-divider::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;background:#fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .lightbox-divider::before{content:"⇆";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:4;font-size:18px;color:var(--navy);font-weight:700}
  .extra-thumb{display:inline-block;margin:8px 6px 0 0;border:1px solid var(--border);border-radius:8px;padding:2px;background:#fff}
  .extra-thumb img{height:70px;display:block;border-radius:6px}

  .footer{max-width:1440px;margin:0 auto;padding:28px;text-align:center;color:var(--muted);font-size:13px;border-top:1px solid var(--border)}
  .empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
  .empty svg{width:48px;height:48px;margin:0 auto 12px;opacity:.4}

  @media (max-width:720px){

    .topbar-inner{flex-wrap:wrap}
    .grid{grid-template-columns:1fr;padding:8px 16px 40px}
    .hero{padding:32px 20px 16px}
    .controls{padding:12px 20px}

</style>

<!-- 觀看人數運算腳本 -->
<script>
(function() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = yyyy + "-" + String(d.getMonth() + 1).padStart(2, '0');
  const dd = mm + "-" + String(d.getDate()).padStart(2, '0');
  
  // 專屬免費獨立資料庫 ID
  const bucket = 'UpdkEy78HzmGeeQsNQHcU2';
  const endpoint = `https://kvdb.io/${bucket}/`;
  
  const keys = ['total', `yr_${yyyy}`, `mo_${mm}`, `dy_${dd}`];
  const els = ['cnt-total', 'cnt-year', 'cnt-month', 'cnt-today'];
  
  // 利用 session 防止同一個人重新整理網頁洗數據
  const isNewHit = !sessionStorage.getItem('ctarch_hit_recorded');
  if (isNewHit) sessionStorage.setItem('ctarch_hit_recorded', '1');

  keys.forEach((key, idx) => {
    const method = isNewHit ? 'PATCH' : 'GET';
    const body = isNewHit ? '+1' : null;
    
    fetch(endpoint + key, { method, body })
      .then(r => r.ok ? r.text() : '0')
      .then(v => {
         const val = parseInt(v) || 0; 
         document.getElementById(els[idx]).innerText = val;
      }).catch(e => console.error("計數器連線錯誤:", e));
  });
})();
</script>

const CATEGORIES = [
  {key:"all",label:"全部"},
  {key:"arch",label:"建築設計"},
  {key:"interior",label:"室內設計"},
  {key:"id",label:"工業設計"},
  {key:"doc",label:"圖說/分析"},
  {key:"photo",label:"攝影後製"}
];

function esc(s){ return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function imgHtml(src, alt){
  if (!src) return '<div class="missing">（尚無對照圖）</div>';
  return '<img src="'+src+'" alt="'+esc(alt)+'" loading="lazy">';
}

function cardHtml(g){
  const catLabel = {arch:'建築',interior:'室內',id:'工業',doc:'圖說',photo:'攝影'}[g.category] || '其他';
  return `
    <article class="card" data-cat="${g.category}">
      <div class="visual"
           data-href="${esc(g.href)}"
           data-title="${esc(g.name)}"
           data-descfull="${esc(g.desc)}"
           data-before="${esc(g.imgBefore)}"
           data-after="${esc(g.imgAfter)}"
           data-extra="${esc(g.imgExtra)}">
        <div class="layer-before">${imgHtml(g.imgBefore, g.name+' Before')}</div>
        <div class="layer-after">${imgHtml(g.imgAfter, g.name+' After')}</div>
        <div class="divider" aria-hidden="true"></div>
        <span class="label label-before">Before</span>
        <span class="label label-after">After</span>
      </div>
      <div class="content">
        <span class="badge ${g.category}">${catLabel}</span>
        <h3 class="title">${g.name}</h3>
        <p class="desc">${g.desc}</p>
        <a class="btn" href="${esc(g.href)}" target="_blank" rel="noopener">
          啟動此 Gem
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
      </div>
    </article>`;
}

const grid = document.getElementById('grid');
const chipsEl = document.getElementById('categoryChips');

CATEGORIES.forEach(c => {
  const count = c.key === 'all' ? GEMS.length : GEMS.filter(g => g.category === c.key).length;
  const btn = document.createElement('button');
  btn.className = 'chip' + (c.key === 'all' ? ' active' : '');
  btn.dataset.cat = c.key;
  btn.innerHTML = `${c.label}<span class="count">${count}</span>`;
  chipsEl.appendChild(btn);
});

function render(){
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const activeCat = document.querySelector('.chip.active')?.dataset.cat || 'all';
  const filtered = GEMS.filter(g => {
    if (activeCat !== 'all' && g.category !== activeCat) return false;
    if (query && !(g.name.toLowerCase().includes(query) || g.desc.toLowerCase().includes(query))) return false;
    return true;
  });
  grid.innerHTML = filtered.length
    ? filtered.map(cardHtml).join('')
    : '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><p>找不到相符的 Gem</p></div>';
  attachInteractions();
}

function attachInteractions(){
  const mode = document.querySelector('.mode-btn.active').dataset.mode;
  if (mode === 'slider') {
    document.querySelectorAll('.visual').forEach(v => {
      const div = v.querySelector('.divider');
      const after = v.querySelector('.layer-after');
      const lb = v.querySelector('.label-before');
      const la = v.querySelector('.label-after');
      if (!div || !after) return;
      let dragging = false;
      // 依滑動位置決定要顯示哪個 label（過半才切換）
      const updateLabels = pct => {
        if (!lb || !la) return;
        if (pct < 50)      { lb.style.display='none'; la.style.display=''; }
        else if (pct > 50) { lb.style.display='';     la.style.display='none'; }
        else               { lb.style.display='';     la.style.display=''; }
      };
      const onMove = e => {
        if (!dragging) return;
        const r = v.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
        const pct = Math.max(0, Math.min(100, (x / r.width) * 100));
        div.style.left = pct + '%';
        after.style.clipPath = `inset(0 0 0 ${pct}%)`;
        updateLabels(pct);
      };
      div.addEventListener('mousedown', e => { e.preventDefault(); dragging = true; });
      v.addEventListener('mousedown', e => {
        if (e.target.classList && e.target.classList.contains('divider')) return;
        dragging = true; onMove(e);
      });
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', () => dragging = false);
      div.addEventListener('touchstart', () => { dragging = true; });
      v.addEventListener('touchmove', onMove);
      v.addEventListener('touchend', () => dragging = false);
    });
  }
  if (mode === 'hover') {
    // 點擊開啟 Lightbox 放大檢視
    document.querySelectorAll('.visual').forEach(v => {
      v.addEventListener('click', () => openLightbox(v));
    });
  }
}

const lightbox = document.getElementById('lightbox');
const lbVisual = document.getElementById('lbVisual');
const lbTitle = document.getElementById('lbTitle');
const lbDesc = document.getElementById('lbDesc');
const lbLink = document.getElementById('lbLink');
const lbExtras = document.getElementById('lbExtras');

function openLightbox(v){
  const before = v.dataset.before, after = v.dataset.after, extra = v.dataset.extra;
  lbTitle.textContent = v.dataset.title;
  lbDesc.textContent = v.dataset.descfull;
  lbLink.href = v.dataset.href;
  lbVisual.innerHTML =
    '<div class="layer-before">'+imgHtml(before, 'Before')+'</div>'+
    '<div class="layer-after" id="lbAfter" style="clip-path:inset(0 0 0 50%)">'+imgHtml(after, 'After')+'</div>'+
    '<span class="label label-before">Before</span>'+
    '<span class="label label-after">After</span>'+
    '<div class="lightbox-divider" id="lbDividerX"></div>';

  if (extra && extra !== 'null' && extra !== '') {
    lbExtras.innerHTML = '<div style="font-size:12px;color:#64748b;margin-top:6px">更多產出：</div>'+
      '<a class="extra-thumb" href="'+extra+'" target="_blank"><img src="'+extra+'" alt="額外產出"></a>';
  } else {
    lbExtras.innerHTML = '';
  }

  const divX = document.getElementById('lbDividerX');
  const lbAfter = document.getElementById('lbAfter');
  const lbLblBefore = lbVisual.querySelector('.label-before');
  const lbLblAfter  = lbVisual.querySelector('.label-after');
  // Lightbox 彈窗內套用與卡片一致的 label 規則
  const updateLbLabels = pct => {
    if (!lbLblBefore || !lbLblAfter) return;
    if (pct < 50)      { lbLblBefore.style.display='none'; lbLblAfter.style.display=''; }
    else if (pct > 50) { lbLblBefore.style.display='';     lbLblAfter.style.display='none'; }
    else               { lbLblBefore.style.display='';     lbLblAfter.style.display=''; }
  };
  let drag = false;
  const mv = e => {
    if (!drag) return;
    const r = lbVisual.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    const pct = Math.max(0, Math.min(100, (x/r.width)*100));
    divX.style.left = pct+'%';
    lbAfter.style.clipPath = `inset(0 0 0 ${pct}%)`;
    updateLbLabels(pct);
  };
  divX.addEventListener('mousedown', ()=>drag=true);
  lbVisual.addEventListener('mousedown', e=>{
    if(e.target===divX) return;
    drag=true; mv(e);
  });
  document.addEventListener('mousemove', mv);
  document.addEventListener('mouseup', ()=>drag=false);

  document.querySelectorAll('.lightbox-toggle button').forEach(b => {
    b.onclick = () => {
      document.querySelectorAll('.lightbox-toggle button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      const view = b.dataset.view;
      if (view === 'slider') {
        lbAfter.style.clipPath = 'inset(0 0 0 50%)';
        divX.style.left='50%';
        divX.style.display='block';
        updateLbLabels(50);
      }
      if (view === 'before') {
        lbAfter.style.clipPath = 'inset(0 0 0 100%)';
        divX.style.display='none';
        updateLbLabels(100); // Before 獨大
      }
      if (view === 'after')  {
        lbAfter.style.clipPath = 'inset(0 0 0 0%)';
        divX.style.display='none';
        updateLbLabels(0);   // After 獨大
      }
    };
  });

  lightbox.classList.add('show');
}
document.querySelector('.lightbox-close').addEventListener('click', ()=>lightbox.classList.remove('show'));
lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('show'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('show'); });

chipsEl.addEventListener('click', e => {
  if (!e.target.closest('.chip')) return;
  const chip = e.target.closest('.chip');
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  render();
});

document.getElementById('searchInput').addEventListener('input', () => render());

document.querySelectorAll('.mode-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    grid.className = 'grid ' + b.dataset.mode + '-mode';
    render();
  });
});

render();
document.getElementById('totalCount').textContent = GEMS.length;
</script>
